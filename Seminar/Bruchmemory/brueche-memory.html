<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Brüche-Memory – BIKI</title>
  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#4f46e5;
      --accent-soft:#c7d2fe;
      --empty:#e5e7eb;
      --line:#e5e7eb;
      --good:#16a34a;
      --bad:#ef4444;
      --shadow: 0 4px 14px rgba(0,0,0,.08);
      --shadow-strong: 0 10px 28px rgba(79,70,229,.22);
      --radius: 14px;
      --gap: 12px;
      --tile-min: 120px;
      --tile-h: 140px;
      --pie-fill:#7c3aed;
      --match-ring:#a78bfa;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      display:flex;
      align-items:center;
      justify-content:center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }

    .app{
      width:min(1100px, 100%);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:14px;
    }

    header{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px 16px;
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px 16px;
      align-items:center;
    }

    .header-left{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    header h1{
      font-size:clamp(18px, 2.5vw, 22px);
      margin:0;
      letter-spacing:.2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .controls label{
      color:var(--muted);
      font-size:14px;
    }

    select, button{
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      font-size:14px;
      cursor:pointer;
      min-height:44px;
      transition:transform .15s ease, box-shadow .15s ease, background-color .15s ease;
    }

    select{
      min-width:170px;
    }

    button.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }

    button:hover{
      transform:translateY(-1px);
    }

    button:active{
      transform:translateY(0);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .stats{
      display:flex;
      gap:12px;
      color:var(--muted);
      font-size:14px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      text-align:right;
    }

    .stats > div{
      background:#fafafa;
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      min-width:92px;
    }

    .board{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      min-height:300px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(var(--tile-min), 1fr));
      gap:var(--gap);
      align-content:start;
    }

    .card{
      perspective:900px;
      position:relative;
      min-height:var(--tile-h);
      height:var(--tile-h);
      isolation:isolate;
    }

    .card button{
      width:100%;
      height:100%;
      border:none;
      padding:0;
      background:transparent;
      min-height:0;
    }

    .inner{
      position:relative;
      width:100%;
      height:100%;
      transition:transform .35s ease;
      transform-style:preserve-3d;
      outline:none;
      border-radius:12px;
    }

    .inner:focus-visible{
      outline:3px solid #2563eb;
      outline-offset:3px;
      border-radius:12px;
    }

    .card.flipped .inner,
    .card.matched .inner{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .front{
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.85), transparent 30%),
        linear-gradient(135deg, #eef2ff, #fdf2f8);
      border-style:dashed;
    }

    .front::after{
      content:"?";
      font-size:clamp(26px, 4vw, 34px);
      font-weight:800;
      color:#818cf8;
      opacity:.65;
    }

    .back{
      transform:rotateY(180deg);
      padding:8px;
    }

    .fractext{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:600;
      letter-spacing:.3px;
      width:100%;
      height:100%;
    }

    .fractext small{
      display:block;
      color:var(--muted);
      font-weight:500;
      font-size:12px;
      margin-top:2px;
    }

    .fraction-stack{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1.05;
      min-width:48px;
    }

    .fraction-stack .top,
    .fraction-stack .bottom{
      font-size:clamp(26px, 4vw, 32px);
      font-weight:700;
    }

    .fraction-stack .bar{
      width:clamp(38px, 7vw, 52px);
      height:2.5px;
      background:var(--text);
      margin:4px 0;
      border-radius:999px;
    }

    .piewrap{
      width:min(86px, 72%);
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
      padding:0 2px;
    }

    .notice{
      font-size:13px;
      max-width:780px;
    }

    .status{
      font-weight:600;
      min-height:1.4em;
    }

    .status.good{ color:var(--good); }
    .status.bad{ color:var(--bad); }

    .win{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.35);
      padding:24px;
      z-index:20;
    }

    .win .box{
      background:#fff;
      border-radius:16px;
      padding:18px;
      width:min(460px,100%);
      box-shadow:0 12px 32px rgba(0,0,0,.25);
    }

    .win h2{ margin:0 0 6px; }

    .win .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .sr-only{
      position:absolute !important;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .card.just-matched{
      animation:matchPop .65s ease;
    }

    .card.just-matched .face.back{
      box-shadow:
        0 0 0 4px rgba(167,139,250,.35),
        0 10px 28px rgba(79,70,229,.22);
      border-color:#c4b5fd;
    }

    .card.just-matched::after{
      content:"✓";
      position:absolute;
      inset:auto 8px 8px auto;
      width:28px;
      height:28px;
      border-radius:999px;
      background:var(--good);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:16px;
      box-shadow:0 6px 14px rgba(22,163,74,.28);
      animation:checkIn .55s ease;
      z-index:3;
      pointer-events:none;
    }

    @keyframes matchPop{
      0%   { transform:scale(1); }
      30%  { transform:scale(1.06); }
      55%  { transform:scale(.98); }
      100% { transform:scale(1); }
    }

    @keyframes checkIn{
      0%   { transform:scale(.3); opacity:0; }
      60%  { transform:scale(1.15); opacity:1; }
      100% { transform:scale(1); opacity:1; }
    }

    @media (max-width: 900px){
      :root{
        --tile-min: 110px;
        --tile-h: 132px;
      }

      header{
        grid-template-columns:1fr;
      }

      .stats{
        justify-content:flex-start;
        text-align:left;
      }
    }

    @media (max-width: 640px){
      :root{
        --gap:10px;
        --tile-min: 96px;
        --tile-h: 118px;
      }

      body{
        padding:10px;
      }

      .app{
        gap:10px;
      }

      header,
      .board{
        padding:12px;
      }

      .controls{
        display:grid;
        grid-template-columns:1fr;
        align-items:stretch;
      }

      .controls label{
        margin-bottom:-2px;
      }

      .controls select,
      .controls button{
        width:100%;
      }

      .stats{
        display:grid;
        grid-template-columns:repeat(3, 1fr);
        gap:8px;
        width:100%;
      }

      .stats > div{
        min-width:0;
        text-align:center;
        padding:8px 6px;
      }

      .notice,
      .status{
        width:100%;
      }

      .win{
        padding:14px;
      }

      .win .actions{
        flex-direction:column;
      }

      .win .actions button{
        width:100%;
      }
    }

    @media (max-width: 420px){
      :root{
        --tile-min: 82px;
        --tile-h: 104px;
      }

      .fraction-stack .top,
      .fraction-stack .bottom{
        font-size:24px;
      }

      .fraction-stack .bar{
        width:34px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *,
      *::before,
      *::after{
        animation:none !important;
        transition:none !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="header-left">
        <h1>Brüche-Memory</h1>

        <div class="controls">
          <label for="difficulty">Schwierigkeit:</label>
          <select id="difficulty" aria-label="Schwierigkeit wählen">
            <option value="easy">Leicht (5 Paare)</option>
            <option value="medium" selected>Mittel (8 Paare)</option>
            <option value="hard">Schwer (12 Paare)</option>
          </select>
          <button id="newGame" class="primary">Neues Spiel</button>
        </div>
      </div>

      <div class="stats" aria-live="polite">
        <div>Züge: <strong id="moves">0</strong></div>
        <div>Zeit: <strong id="time">00:00</strong></div>
        <div>Gefunden: <strong id="found">0</strong></div>
      </div>
    </header>

    <main class="board" id="board" aria-label="Spielfeld"></main>

    <div class="footer">
      <div class="notice">
        Brüche werden in vollständig gekürzter Form und mit einfachen Nennern (2, 3, 4, 5, 6, 8) verwendet.
      </div>
      <div id="feedback" class="status" aria-live="polite"></div>
    </div>
  </div>

  <div class="win" id="win" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="box">
      <h2 id="winTitle">Geschafft!</h2>
      <p>Du hast alle Paare gefunden.</p>
      <ul>
        <li>Zeit: <strong id="resTime">–</strong></li>
        <li>Züge: <strong id="resMoves">–</strong></li>
      </ul>
      <div class="actions">
        <button id="closeWin">Schließen</button>
        <button id="again" class="primary">Noch einmal spielen</button>
      </div>
    </div>
  </div>

  <script>
    function gcd(a, b){
      while(b){
        [a, b] = [b, a % b];
      }
      return a;
    }

    function fmtFrac(n, d){
      return n + "/" + d;
    }

    const DIFF_CONFIG = {
      easy:   { denoms:[2,3,4],       pairs:5 },
      medium: { denoms:[2,3,4,5,6],   pairs:8 },
      hard:   { denoms:[2,3,4,5,6,8], pairs:12 }
    };

    function buildPool(denoms){
      const pool = [];
      for(const d of denoms){
        for(let n = 1; n < d; n++){
          if(gcd(n, d) === 1){
            pool.push({ n, d, key: fmtFrac(n, d) });
          }
        }
      }
      return pool;
    }

    function sampleUnique(arr, k){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a.slice(0, Math.min(k, a.length));
    }

    function buildDeck(fractions){
      const deck = [];

      fractions.forEach((f) => {
        const pairId = "pair_" + f.key;

        deck.push({
          id: pairId + "_txt",
          pair: pairId,
          type: "text",
          n: f.n,
          d: f.d,
          label: fmtFrac(f.n, f.d)
        });

        deck.push({
          id: pairId + "_pie",
          pair: pairId,
          type: "pie",
          n: f.n,
          d: f.d,
          label: fmtFrac(f.n, f.d)
        });
      });

      for(let i = deck.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }

      return deck;
    }

    function polarToCartesian(cx, cy, r, angleDeg){
      const rad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(rad),
        y: cy + r * Math.sin(rad)
      };
    }

    function sectorPath(cx, cy, r, startAngle, endAngle){
      const p1 = polarToCartesian(cx, cy, r, startAngle);
      const p2 = polarToCartesian(cx, cy, r, endAngle);
      const delta = endAngle - startAngle;
      const largeArc = delta > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y} Z`;
    }

    function makePieSVG(n, d, size = 86){
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
      svg.setAttribute("role", "img");
      svg.setAttribute("aria-label", `Kreisdiagramm zu ${fmtFrac(n, d)}`);

      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.48;
      const fillColor = getComputedStyle(document.documentElement).getPropertyValue('--pie-fill').trim() || "#7c3aed";

      const bg = document.createElementNS(svg.namespaceURI, "circle");
      bg.setAttribute("cx", cx);
      bg.setAttribute("cy", cy);
      bg.setAttribute("r", r);
      bg.setAttribute("fill", "white");
      bg.setAttribute("stroke", "#d1d5db");
      bg.setAttribute("stroke-width", "1");
      svg.appendChild(bg);

      for(let k = 0; k < d; k++){
        const start = k * 360 / d;
        const end = (k + 1) * 360 / d;

        const path = document.createElementNS(svg.namespaceURI, "path");
        path.setAttribute("d", sectorPath(cx, cy, r, start, end));
        path.setAttribute("fill", k < n ? fillColor : "#eef2f7");
        path.setAttribute("stroke", "#d1d5db");
        path.setAttribute("stroke-width", "0.75");
        svg.appendChild(path);
      }

      return svg;
    }

    function renderCard(card){
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.id = card.id;
      el.dataset.pair = card.pair;
      el.dataset.type = card.type;

      const btn = document.createElement("button");
      btn.className = "inner";
      btn.setAttribute("type", "button");
      btn.setAttribute(
        "aria-label",
        card.type === "text"
          ? `Bruch ${card.n} von ${card.d}`
          : `Kreisdiagramm zu ${fmtFrac(card.n, card.d)}`
      );

      const front = document.createElement("div");
      front.className = "face front";

      const back = document.createElement("div");
      back.className = "face back";

      if(card.type === "text"){
        const t = document.createElement("div");
        t.className = "fractext";
        t.innerHTML = `
          <div class="fraction-stack" aria-hidden="true">
            <div class="top">${card.n}</div>
            <div class="bar"></div>
            <div class="bottom">${card.d}</div>
          </div>
          <small>Bruch</small>
        `;
        back.appendChild(t);
      } else {
        const w = document.createElement("div");
        w.className = "piewrap";
        w.appendChild(makePieSVG(card.n, card.d, 86));
        back.appendChild(w);
      }

      btn.appendChild(front);
      btn.appendChild(back);
      el.appendChild(btn);

      return el;
    }

    const boardEl = document.getElementById("board");
    const feedbackEl = document.getElementById("feedback");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const foundEl = document.getElementById("found");
    const diffSel = document.getElementById("difficulty");
    const btnNew = document.getElementById("newGame");
    const winBox = document.getElementById("win");
    const resTime = document.getElementById("resTime");
    const resMoves = document.getElementById("resMoves");
    const againBtn = document.getElementById("again");
    const closeWin = document.getElementById("closeWin");

    let deck = [];
    let first = null;
    let second = null;
    let lock = false;
    let moves = 0;
    let foundPairs = 0;
    let totalPairs = 0;
    let timer = null;
    let startTs = null;

    function resetStats(){
      moves = 0;
      foundPairs = 0;
      movesEl.textContent = "0";
      foundEl.textContent = "0";
      timeEl.textContent = "00:00";
      feedbackEl.textContent = "";
      feedbackEl.className = "status";
      stopTimer();
    }

    function startTimer(){
      startTs = Date.now();
      timer = setInterval(() => {
        const t = Math.floor((Date.now() - startTs) / 1000);
        timeEl.textContent = fmtTime(t);
      }, 200);
    }

    function stopTimer(){
      if(timer){
        clearInterval(timer);
        timer = null;
      }
    }

    function fmtTime(sec){
      const m = Math.floor(sec / 60).toString().padStart(2, "0");
      const s = (sec % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function setupGame(){
      resetStats();

      const cfg = DIFF_CONFIG[diffSel.value];
      const pool = buildPool(cfg.denoms);
      const chosen = sampleUnique(pool, cfg.pairs);

      totalPairs = chosen.length;
      deck = buildDeck(chosen);

      boardEl.innerHTML = "";

      deck.forEach(card => {
        const el = renderCard(card);
        boardEl.appendChild(el);
      });

      boardEl.querySelectorAll(".card .inner").forEach(btn => {
        btn.addEventListener("click", onCardClick);
      });

      startTs = null;
      first = null;
      second = null;
      lock = false;
    }

    function onCardClick(e){
      if(lock) return;

      const btn = e.currentTarget;
      const cardEl = btn.closest(".card");

      if(cardEl.classList.contains("flipped") || cardEl.classList.contains("matched")){
        return;
      }

      cardEl.classList.add("flipped");

      if(!startTs){
        startTimer();
      }

      const card = {
        el: cardEl,
        pair: cardEl.dataset.pair,
        type: cardEl.dataset.type
      };

      if(!first){
        first = card;
        feedback("");
      } else if(!second){
        second = card;
        moves++;
        movesEl.textContent = String(moves);
        checkMatch();
      }
    }

    function addMatchEffect(cardEl){
      cardEl.classList.add("just-matched");
      setTimeout(() => {
        cardEl.classList.remove("just-matched");
      }, 700);
    }

    function checkMatch(){
      if(!first || !second) return;

      lock = true;
      const isSamePair = first.pair === second.pair;
      const differentTypes = first.type !== second.type;

      if(isSamePair && differentTypes){
        setTimeout(() => {
          first.el.classList.add("matched");
          second.el.classList.add("matched");

          addMatchEffect(first.el);
          addMatchEffect(second.el);

          foundPairs++;
          foundEl.textContent = String(foundPairs);
          feedback("Richtig! Paar gefunden.", "good");

          resetPick();
          lock = false;

          if(foundPairs === totalPairs){
            stopTimer();
            const elapsed = Math.floor((Date.now() - startTs) / 1000);
            resTime.textContent = fmtTime(elapsed);
            resMoves.textContent = String(moves);

            setTimeout(() => {
              winBox.style.display = "flex";
            }, 450);
          }
        }, 250);
      } else {
        feedback("Leider nicht. Versuche es erneut.", "bad");

        setTimeout(() => {
          first.el.classList.remove("flipped");
          second.el.classList.remove("flipped");
          resetPick();
          lock = false;
        }, 850);
      }
    }

    function resetPick(){
      first = null;
      second = null;
    }

    function feedback(msg, cls){
      feedbackEl.className = "status" + (cls ? " " + cls : "");
      feedbackEl.textContent = msg || "";
    }

    btnNew.addEventListener("click", () => {
      winBox.style.display = "none";
      setupGame();
    });

    diffSel.addEventListener("change", () => {
      winBox.style.display = "none";
      setupGame();
    });

    againBtn.addEventListener("click", () => {
      winBox.style.display = "none";
      setupGame();
    });

    closeWin.addEventListener("click", () => {
      winBox.style.display = "none";
    });

    setupGame();
  </script>
</body>
</html>
