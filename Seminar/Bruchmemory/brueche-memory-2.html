<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brüche-Memory</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe4f0;
      --accent:#3b82f6;
      --numerator:#dc2626;
      --good:#15803d;
      --bad:#b91c1c;
      --radius:18px;
      --gap:14px;
      --shadow:0 8px 24px rgba(31,41,55,.08);
    }

    *{ box-sizing:border-box; }

    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .app{
      width:min(1100px, 100%);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:14px;
    }

    header{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px 16px;
    }

    header h1{
      font-size:22px;
      margin:0;
      letter-spacing:.2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .controls label{
      color:var(--muted);
      font-size:14px;
    }

    select, button{
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:8px 12px;
      border-radius:10px;
      font-size:14px;
      cursor:pointer;
    }

    button.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .stats{
      display:flex;
      gap:14px;
      color:var(--muted);
      font-size:14px;
      align-items:center;
      flex-wrap:wrap;
    }

    .board{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      min-height:300px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
      gap:var(--gap);
      align-content:start;
    }

    .card{
      perspective:900px;
      position:relative;
      height:150px;
    }

    .card button{
      width:100%;
      height:100%;
      border:none;
      padding:0;
      background:transparent;
    }

    .inner{
      position:relative;
      width:100%;
      height:100%;
      transition:transform .35s ease;
      transform-style:preserve-3d;
      outline:none;
    }

    .card.flipped .inner,
    .card.matched .inner{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .front{
      background:linear-gradient(135deg, #eef2ff, #fdf2f8);
      border-style:dashed;
    }

    .front::after{
      content:"?";
      font-size:34px;
      font-weight:700;
      color:#94a3b8;
    }

    .back{
      transform:rotateY(180deg);
      padding:8px;
    }

    .fraction-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .fraction{
      display:inline-grid;
      grid-template-rows:auto 3px auto;
      align-items:center;
      justify-items:center;
      min-width:54px;
      line-height:1.05;
    }

    .fraction .num{
      color:var(--numerator);
      font-size:32px;
      font-weight:800;
      padding-bottom:4px;
    }

    .fraction .bar{
      width:44px;
      height:3px;
      background:var(--text);
      border-radius:999px;
      margin:1px 0 3px;
    }

    .fraction .den{
      color:var(--text);
      font-size:32px;
      font-weight:700;
      padding-top:2px;
    }

    .piewrap{
      width:90px;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
      padding:0 2px;
    }

    .notice{
      font-size:13px;
    }

    .status{
      font-weight:700;
    }

    .status.good{ color:var(--good); }
    .status.bad{ color:var(--bad); }

    .win{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.35);
      padding:24px;
      z-index:20;
    }

    .win .box{
      background:#fff;
      border-radius:16px;
      padding:18px;
      width:min(460px,100%);
      box-shadow:0 12px 32px rgba(0,0,0,.25);
    }

    .win h2{ margin:0 0 6px; }

    .win .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:12px;
    }

    .sr-only{
      position:absolute !important;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .confetti-layer{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:30;
    }

    .confetti{
      position:absolute;
      top:-20px;
      width:10px;
      height:14px;
      border-radius:2px;
      opacity:.95;
      animation:confettiFall 900ms linear forwards;
    }

    @keyframes confettiFall{
      0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
      }
      100%{
        transform:translateY(220px) rotate(540deg);
        opacity:0;
      }
    }

    @media (max-width: 700px){
      .board{
        grid-template-columns:repeat(auto-fit, minmax(100px, 1fr));
      }
      .card{
        height:130px;
      }
      .fraction .num,
      .fraction .den{
        font-size:28px;
      }
      .fraction .bar{
        width:38px;
      }
      .piewrap{
        width:78px;
        height:78px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <h1>Brüche-Memory</h1>
      <div class="controls">
        <label for="difficulty">Schwierigkeit:</label>
        <select id="difficulty" aria-label="Schwierigkeit wählen">
          <option value="easy">Leicht (5 Paare)</option>
          <option value="medium" selected>Mittel (8 Paare)</option>
          <option value="hard">Schwer (12 Paare)</option>
        </select>
        <button id="newGame" class="primary">Neues Spiel</button>
      </div>
      <div class="stats" aria-live="polite">
        <div>Züge: <strong id="moves">0</strong></div>
        <div>Zeit: <strong id="time">00:00</strong></div>
        <div>Gefunden: <strong id="found">0</strong></div>
      </div>
    </header>

    <main class="board" id="board" aria-label="Spielfeld"></main>

    <div class="footer">
      <div class="notice">
        Brüche werden in vollständig gekürzter Form und mit einfachen Nennern (2, 3, 4, 5, 6, 8) verwendet.
      </div>
      <div id="feedback" class="status" aria-live="polite"></div>
    </div>
  </div>

  <div class="win" id="win">
    <div class="box">
      <h2>Geschafft!</h2>
      <p>Du hast alle Paare gefunden.</p>
      <ul>
        <li>Zeit: <strong id="resTime">–</strong></li>
        <li>Züge: <strong id="resMoves">–</strong></li>
      </ul>
      <div class="actions">
        <button id="closeWin">Schließen</button>
        <button id="again" class="primary">Noch einmal spielen</button>
      </div>
    </div>
  </div>

  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

  <script>
    function gcd(a, b){
      while(b){
        [a, b] = [b, a % b];
      }
      return a;
    }

    function fmtFrac(n, d){
      return n + "/" + d;
    }

    const DIFF_CONFIG = {
      easy:   { denoms:[2,3,4], pairs:5 },
      medium: { denoms:[2,3,4,5,6], pairs:8 },
      hard:   { denoms:[2,3,4,5,6,8], pairs:12 }
    };

    function buildPool(denoms){
      const pool = [];
      for(const d of denoms){
        for(let n = 1; n < d; n++){
          if(gcd(n, d) === 1){
            pool.push({ n, d, key: fmtFrac(n, d) });
          }
        }
      }
      return pool;
    }

    function sampleUnique(arr, k){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a.slice(0, Math.min(k, a.length));
    }

    function buildDeck(fractions){
      const deck = [];
      fractions.forEach((f) => {
        const pairId = "pair_" + f.key;
        deck.push({
          id: pairId + "_txt",
          pair: pairId,
          type: "text",
          n: f.n,
          d: f.d,
          label: fmtFrac(f.n, f.d)
        });
        deck.push({
          id: pairId + "_pie",
          pair: pairId,
          type: "pie",
          n: f.n,
          d: f.d,
          label: fmtFrac(f.n, f.d)
        });
      });

      for(let i = deck.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      return deck;
    }

    function polarToCartesian(cx, cy, r, angleDeg){
      const rad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(rad),
        y: cy + r * Math.sin(rad)
      };
    }

    function sectorPath(cx, cy, r, startAngle, endAngle){
      const p1 = polarToCartesian(cx, cy, r, startAngle);
      const p2 = polarToCartesian(cx, cy, r, endAngle);
      const largeArc = (endAngle - startAngle) % 360 > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y} Z`;
    }

    function makePieSVG(n, d, size = 86){
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
      svg.setAttribute("role", "img");
      svg.setAttribute("aria-label", `Kreisdiagramm zu ${fmtFrac(n, d)}`);

      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.48;

      const bg = document.createElementNS(svg.namespaceURI, "circle");
      bg.setAttribute("cx", cx);
      bg.setAttribute("cy", cy);
      bg.setAttribute("r", r);
      bg.setAttribute("fill", "white");
      bg.setAttribute("stroke", "#e5e7eb");
      bg.setAttribute("stroke-width", "1");
      svg.appendChild(bg);

      for(let k = 0; k < d; k++){
        const start = k * 360 / d;
        const end   = (k + 1) * 360 / d;
        const path = document.createElementNS(svg.namespaceURI, "path");
        path.setAttribute("d", sectorPath(cx, cy, r, start, end));
        path.setAttribute("fill", k < n ? "url(#gradAccent)" : "#eef2f7");
        path.setAttribute("stroke", "#d1d5db");
        path.setAttribute("stroke-width", "0.5");
        svg.appendChild(path);
      }

      ensureDefs(svg);
      return svg;
    }

    function ensureDefs(svg){
      const doc = svg.ownerDocument;
      let defs = doc.querySelector("defs#common-defs");

      if(!defs){
        defs = document.createElementNS(svg.namespaceURI, "defs");
        defs.setAttribute("id", "common-defs");

        const grad = document.createElementNS(svg.namespaceURI, "linearGradient");
        grad.setAttribute("id", "gradAccent");
        grad.setAttribute("x1", "0");
        grad.setAttribute("y1", "0");
        grad.setAttribute("x2", "1");
        grad.setAttribute("y2", "1");

        const s1 = document.createElementNS(svg.namespaceURI, "stop");
        s1.setAttribute("offset", "0%");
        s1.setAttribute("stop-color", "#fca5a5");

        const s2 = document.createElementNS(svg.namespaceURI, "stop");
        s2.setAttribute("offset", "100%");
        s2.setAttribute("stop-color", "#dc2626");

        grad.appendChild(s1);
        grad.appendChild(s2);
        defs.appendChild(grad);

        document.body.appendChild(defs);
      }
    }

    function makeFractionHTML(n, d){
      return `
        <div class="fraction-wrap" aria-hidden="true">
          <div class="fraction">
            <div class="num">${n}</div>
            <div class="bar"></div>
            <div class="den">${d}</div>
          </div>
        </div>
      `;
    }

    function renderCard(card){
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.id = card.id;
      el.dataset.pair = card.pair;
      el.dataset.type = card.type;

      const btn = document.createElement("button");
      btn.className = "inner";
      btn.setAttribute(
        "aria-label",
        card.type === "text"
          ? `Bruch ${card.n} durch ${card.d}`
          : `Kreisdiagramm zu ${card.n} von ${card.d}`
      );
      btn.setAttribute("type", "button");

      const front = document.createElement("div");
      front.className = "face front";

      const back = document.createElement("div");
      back.className = "face back";

      if(card.type === "text"){
        const t = document.createElement("div");
        t.innerHTML = makeFractionHTML(card.n, card.d);
        t.innerHTML += `<span class="sr-only">${card.n} durch ${card.d}</span>`;
        back.appendChild(t);
      }else{
        const w = document.createElement("div");
        w.className = "piewrap";
        w.appendChild(makePieSVG(card.n, card.d, 86));
        back.appendChild(w);
      }

      btn.appendChild(front);
      btn.appendChild(back);
      el.appendChild(btn);
      return el;
    }

    const boardEl = document.getElementById("board");
    const feedbackEl = document.getElementById("feedback");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const foundEl = document.getElementById("found");
    const diffSel = document.getElementById("difficulty");
    const btnNew = document.getElementById("newGame");
    const winBox = document.getElementById("win");
    const resTime = document.getElementById("resTime");
    const resMoves = document.getElementById("resMoves");
    const againBtn = document.getElementById("again");
    const closeWin = document.getElementById("closeWin");
    const confettiLayer = document.getElementById("confettiLayer");

    let deck = [];
    let first = null;
    let second = null;
    let lock = false;
    let moves = 0;
    let foundPairs = 0;
    let totalPairs = 0;
    let timer = null;
    let startTs = null;

    function resetStats(){
      moves = 0;
      foundPairs = 0;
      movesEl.textContent = "0";
      foundEl.textContent = "0";
      timeEl.textContent = "00:00";
      feedbackEl.textContent = "";
      stopTimer();
    }

    function startTimer(){
      startTs = Date.now();
      timer = setInterval(() => {
        const t = Math.floor((Date.now() - startTs) / 1000);
        timeEl.textContent = fmtTime(t);
      }, 200);
    }

    function stopTimer(){
      if(timer){
        clearInterval(timer);
        timer = null;
      }
    }

    function fmtTime(sec){
      const m = Math.floor(sec / 60).toString().padStart(2, "0");
      const s = (sec % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function setupGame(){
      resetStats();
      const cfg = DIFF_CONFIG[diffSel.value];
      const pool = buildPool(cfg.denoms);
      const chosen = sampleUnique(pool, cfg.pairs);
      totalPairs = chosen.length;
      deck = buildDeck(chosen);

      boardEl.innerHTML = "";
      deck.forEach(card => {
        const el = renderCard(card);
        boardEl.appendChild(el);
      });

      boardEl.querySelectorAll(".card .inner").forEach(btn => {
        btn.addEventListener("click", onCardClick);
      });

      startTs = null;
    }

    function onCardClick(e){
      if(lock) return;

      const btn = e.currentTarget;
      const cardEl = btn.closest(".card");

      if(cardEl.classList.contains("flipped") || cardEl.classList.contains("matched")) return;

      cardEl.classList.add("flipped");

      if(!startTs){
        startTimer();
      }

      const card = {
        el: cardEl,
        pair: cardEl.dataset.pair,
        type: cardEl.dataset.type
      };

      if(!first){
        first = card;
        feedback("");
      }else if(!second){
        second = card;
        moves++;
        movesEl.textContent = String(moves);
        checkMatch();
      }
    }

    function checkMatch(){
      if(!first || !second) return;

      lock = true;
      const isSamePair = first.pair === second.pair;
      const differentTypes = first.type !== second.type;

      if(isSamePair && differentTypes){
        setTimeout(() => {
          first.el.classList.add("matched");
          second.el.classList.add("matched");
          foundPairs++;
          foundEl.textContent = String(foundPairs);
          feedback("Richtig!", "good");
          burstConfetti(first.el, second.el);
          resetPick();
          lock = false;

          if(foundPairs === totalPairs){
            stopTimer();
            const elapsed = Math.floor((Date.now() - startTs) / 1000);
            resTime.textContent = fmtTime(elapsed);
            resMoves.textContent = String(moves);
            winBox.style.display = "flex";
            burstConfetti();
          }
        }, 250);
      }else{
        feedback("Leider nicht. Versuche es erneut.", "bad");
        setTimeout(() => {
          first.el.classList.remove("flipped");
          second.el.classList.remove("flipped");
          resetPick();
          lock = false;
        }, 800);
      }
    }

    function resetPick(){
      first = null;
      second = null;
    }

    function feedback(msg, cls){
      feedbackEl.className = "status" + (cls ? " " + cls : "");
      feedbackEl.textContent = msg || "";
    }

    function burstConfetti(cardA, cardB){
      let centerX = window.innerWidth / 2;
      let centerY = window.innerHeight / 3;

      if(cardA && cardB){
        const r1 = cardA.getBoundingClientRect();
        const r2 = cardB.getBoundingClientRect();
        centerX = ((r1.left + r1.right) / 2 + (r2.left + r2.right) / 2) / 2;
        centerY = ((r1.top + r1.bottom) / 2 + (r2.top + r2.bottom) / 2) / 2;
      }

      const colors = ["#ef4444", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899"];
      const pieces = 22;

      for(let i = 0; i < pieces; i++){
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = `${centerX + (Math.random() * 80 - 40)}px`;
        c.style.top = `${centerY - 20 + (Math.random() * 20 - 10)}px`;
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.transform = `translateY(0) rotate(${Math.random() * 180}deg)`;
        c.style.animationDuration = `${700 + Math.random() * 500}ms`;
        c.style.width = `${8 + Math.random() * 6}px`;
        c.style.height = `${10 + Math.random() * 8}px`;
        confettiLayer.appendChild(c);

        setTimeout(() => c.remove(), 1300);
      }
    }

    btnNew.addEventListener("click", () => {
      winBox.style.display = "none";
      setupGame();
    });

    diffSel.addEventListener("change", setupGame);

    againBtn.addEventListener("click", () => {
      winBox.style.display = "none";
      setupGame();
    });

    closeWin.addEventListener("click", () => {
      winBox.style.display = "none";
    });

    setupGame();
  </script>
</body>
</html>
