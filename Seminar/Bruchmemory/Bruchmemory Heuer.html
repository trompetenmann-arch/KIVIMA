<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brüche-Memory – 2 Spieler</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }

    select, button, input {
      padding: 8px 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
    }

    .players {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .player {
      background: #ffffff;
      padding: 10px 15px;
      border-radius: 10px;
      border: 2px solid transparent;
      min-width: 160px;
      transition: all 0.3s ease;
    }

    .player.active {
      border-color: #3b82f6;
      background: #e0e7ff;
      transform: scale(1.05);
    }

    .player-score {
      font-size: 20px;
      font-weight: bold;
      margin-top: 5px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      perspective: 1000px;
      height: 130px;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.4s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .card.flipped .inner,
    .card.matched .inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    .front {
      background: linear-gradient(135deg, #e0e7ff, #fce7f3);
    }

    .back {
      transform: rotateY(180deg);
      flex-direction: column;
    }

    /* Bruchdarstellung */
    .fraction {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
    }

    .fraction .numerator {
      padding: 0 6px 2px 6px;
    }

    .fraction .denominator {
      border-top: 2px solid #000;
      padding: 2px 6px 0 6px;
    }

    /* Animation bei richtigem Paar */
    .card.correct {
      animation: correctAnimation 0.6s ease;
    }

    @keyframes correctAnimation {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Siegesdialog */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>Brüche-Memory – 2 Spieler</h1>

  <div class="controls">
    <label>Spieler 1:
      <input type="text" id="player1Name" value="Spieler 1">
    </label>
    <label>Spieler 2:
      <input type="text" id="player2Name" value="Spieler 2">
    </label>

    <label for="difficulty">Schwierigkeit:</label>
    <select id="difficulty">
      <option value="easy">Leicht (Nenner 2–4)</option>
      <option value="medium" selected>Mittel (Nenner 2–6)</option>
      <option value="hard">Schwer (Nenner 2–10)</option>
    </select>

    <label for="tiles">Kacheln:</label>
    <select id="tiles">
      <option value="10">10</option>
      <option value="16" selected>16</option>
      <option value="24">24</option>
      <option value="32">32</option>
    </select>

    <button id="newGame">Neues Spiel</button>
  </div>

  <div class="players">
    <div class="player active" id="player1">
      <div class="player-name" id="p1Display">Spieler 1</div>
      <div class="player-score" id="p1Score">Paare: 0</div>
    </div>
    <div class="player" id="player2">
      <div class="player-name" id="p2Display">Spieler 2</div>
      <div class="player-score" id="p2Score">Paare: 0</div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <!-- Siegesdialog -->
  <div class="modal" id="winModal">
    <div class="modal-content">
      <h2 id="winText"></h2>
      <button onclick="setupGame()">Noch einmal spielen</button>
    </div>
  </div>

  <script>
    // Hilfsfunktionen
    function gcd(a, b) {
      return b ? gcd(b, a % b) : a;
    }

    const DIFF_CONFIG = {
      easy: { denoms: [2, 3, 4] },
      medium: { denoms: [2, 3, 4, 5, 6] },
      hard: { denoms: [2, 3, 4, 5, 6, 8, 10] }
    };

    function buildPool(denoms) {
      const pool = [];
      for (const d of denoms) {
        for (let n = 1; n < d; n++) {
          if (gcd(n, d) === 1) {
            pool.push({ n, d, key: `${n}_${d}` });
          }
        }
      }
      return pool;
    }

    function sampleUnique(arr, k) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, k);
    }

    function buildDeck(fractions) {
      const deck = [];
      fractions.forEach(f => {
        const pairId = `pair_${f.key}`;
        deck.push({ pair: pairId, type: "text", ...f });
        deck.push({ pair: pairId, type: "pie", ...f });
      });
      return sampleUnique(deck, deck.length);
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function sectorPath(cx, cy, r, startAngle, endAngle) {
      const p1 = polarToCartesian(cx, cy, r, startAngle);
      const p2 = polarToCartesian(cx, cy, r, endAngle);
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y} Z`;
    }

    function makePieSVG(n, d, size = 80) {
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
      const cx = size / 2, cy = size / 2, r = size * 0.45;

      for (let i = 0; i < d; i++) {
        const path = document.createElementNS(svgNS, "path");
        path.setAttribute(
          "d",
          sectorPath(cx, cy, r, i * 360 / d, (i + 1) * 360 / d)
        );
        path.setAttribute("fill", i < n ? "#ff0000" : "#ffffff");
        path.setAttribute("stroke", "#000");
        svg.appendChild(path);
      }
      return svg;
    }

    function createFractionElement(n, d) {
      const frac = document.createElement("div");
      frac.className = "fraction";
      frac.innerHTML = `<div class="numerator">${n}</div>
                        <div class="denominator">${d}</div>`;
      return frac;
    }

    function renderCard(card) {
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.pair = card.pair;

      const inner = document.createElement("div");
      inner.className = "inner";

      const front = document.createElement("div");
      front.className = "face front";

      const back = document.createElement("div");
      back.className = "face back";

      if (card.type === "text") {
        back.appendChild(createFractionElement(card.n, card.d));
      } else {
        back.appendChild(makePieSVG(card.n, card.d));
      }

      inner.appendChild(front);
      inner.appendChild(back);
      el.appendChild(inner);
      return el;
    }

    // Spielvariablen
    const board = document.getElementById("board");
    const difficulty = document.getElementById("difficulty");
    const tilesSelect = document.getElementById("tiles");
    const newGameBtn = document.getElementById("newGame");

    const player1NameInput = document.getElementById("player1Name");
    const player2NameInput = document.getElementById("player2Name");
    const p1Display = document.getElementById("p1Display");
    const p2Display = document.getElementById("p2Display");
    const p1ScoreEl = document.getElementById("p1Score");
    const p2ScoreEl = document.getElementById("p2Score");
    const player1El = document.getElementById("player1");
    const player2El = document.getElementById("player2");

    const winModal = document.getElementById("winModal");
    const winText = document.getElementById("winText");

    let first = null;
    let second = null;
    let lock = false;
    let currentPlayer = 1;
    let scores = [0, 0];
    let totalPairs = 0;

    function updatePlayerDisplay() {
      p1Display.textContent = player1NameInput.value || "Spieler 1";
      p2Display.textContent = player2NameInput.value || "Spieler 2";
      p1ScoreEl.textContent = `Paare: ${scores[0]}`;
      p2ScoreEl.textContent = `Paare: ${scores[1]}`;

      player1El.classList.toggle("active", currentPlayer === 1);
      player2El.classList.toggle("active", currentPlayer === 2);
    }

    function setupGame() {
      scores = [0, 0];
      currentPlayer = 1;
      updatePlayerDisplay();
      winModal.style.display = "none";

      const denoms = DIFF_CONFIG[difficulty.value].denoms;
      const tileCount = parseInt(tilesSelect.value, 10);
      totalPairs = tileCount / 2;

      const pool = buildPool(denoms);
      if (totalPairs > pool.length) {
        alert("Nicht genügend unterschiedliche Brüche für diese Einstellung.");
        return;
      }

      const fractions = sampleUnique(pool, totalPairs);
      const deck = buildDeck(fractions);

      board.innerHTML = "";
      first = null;
      second = null;
      lock = false;

      deck.forEach(card => {
        const cardEl = renderCard(card);
        board.appendChild(cardEl);

        cardEl.addEventListener("click", () => {
          if (
            lock ||
            cardEl.classList.contains("flipped") ||
            cardEl.classList.contains("matched")
          ) return;

          cardEl.classList.add("flipped");

          if (!first) {
            first = cardEl;
          } else {
            second = cardEl;
            lock = true;

            const isMatch = first.dataset.pair === second.dataset.pair;

            setTimeout(() => {
              if (isMatch) {
                first.classList.add("matched", "correct");
                second.classList.add("matched", "correct");

                scores[currentPlayer - 1]++;
                updatePlayerDisplay();

                if (scores[0] + scores[1] === totalPairs) {
                  endGame();
                }

                resetTurn(); // Spieler bleibt am Zug
              } else {
                first.classList.remove("flipped");
                second.classList.remove("flipped");

                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updatePlayerDisplay();
                resetTurn();
              }
            }, 3000);
          }
        });
      });
    }

    function resetTurn() {
      first = null;
      second = null;
      lock = false;
    }

    function endGame() {
      const name1 = player1NameInput.value || "Spieler 1";
      const name2 = player2NameInput.value || "Spieler 2";

      let message;
      if (scores[0] > scores[1]) {
        message = `${name1} hat gewonnen! 🎉`;
      } else if (scores[1] > scores[0]) {
        message = `${name2} hat gewonnen! 🎉`;
      } else {
        message = "Unentschieden! 🤝";
      }

      winText.textContent = message;
      winModal.style.display = "flex";
    }

    newGameBtn.addEventListener("click", setupGame);
    difficulty.addEventListener("change", setupGame);
    tilesSelect.addEventListener("change", setupGame);
    player1NameInput.addEventListener("input", updatePlayerDisplay);
    player2NameInput.addEventListener("input", updatePlayerDisplay);

    // Initialisierung
    setupGame();
  </script>
</body>
</html>
