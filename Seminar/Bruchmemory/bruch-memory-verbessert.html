<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brüche-Memory – verbessert</title>

<style>
body{
  font-family: system-ui;
  background:#f7f7fb;
  display:flex;
  justify-content:center;
  padding:20px;
}

.board{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap:12px;
  max-width:900px;
}

.card{
  height:140px;
  perspective:800px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform .4s;
}

.card.flipped .inner,
.card.matched .inner{
  transform: rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  border:1px solid #ddd;
}

.front{
  background:#e5e7eb;
}

.back{
  transform: rotateY(180deg);
  background:white;
}

/* Bruchdarstellung */
.fraction{
  display:inline-block;
  text-align:center;
  font-size:26px;
  font-weight:600;
}

.fraction .top{
  display:block;
  border-bottom:2px solid black;
}

.fraction .bottom{
  display:block;
}

/* Feedback */
.card.correct .back{
  background:#bbf7d0;
  border:2px solid #16a34a;
}

.card.wrong .back{
  background:#fecaca;
  border:2px solid #dc2626;
}

</style>
</head>

<body>

<div class="board" id="board"></div>

<script>

function gcd(a,b){ return b?gcd(b,a%b):a; }

function buildFractions(){
  let arr=[];
  for(let d of [2,3,4,5,6]){
    for(let n=1;n<d;n++){
      if(gcd(n,d)===1){
        arr.push({n,d,key:n+"/"+d});
      }
    }
  }
  return arr.slice(0,8);
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function createPie(n,d){
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 100 100");

  let angle=0;

  for(let i=0;i<d;i++){
    let path=document.createElementNS(svg.namespaceURI,"path");

    let start=angle;
    let end=angle+360/d;

    let x1=50+40*Math.cos(Math.PI*(start-90)/180);
    let y1=50+40*Math.sin(Math.PI*(start-90)/180);
    let x2=50+40*Math.cos(Math.PI*(end-90)/180);
    let y2=50+40*Math.sin(Math.PI*(end-90)/180);

    let large=end-start>180?1:0;

    path.setAttribute("d",`M50 50 L${x1} ${y1} A40 40 0 ${large} 1 ${x2} ${y2} Z`);
    path.setAttribute("fill", i<n ? "#ef4444" : "#e5e7eb");

    svg.appendChild(path);
    angle+=360/d;
  }

  return svg;
}

let first=null, second=null, lock=false;

function createCard(card,type){
  let el=document.createElement("div");
  el.className="card";
  el.dataset.pair=card.key;
  el.dataset.type=type;

  let inner=document.createElement("div");
  inner.className="inner";

  let front=document.createElement("div");
  front.className="face front";

  let back=document.createElement("div");
  back.className="face back";

  if(type==="text"){
    back.innerHTML=`
      <span class="fraction">
        <span class="top">${card.n}</span>
        <span class="bottom">${card.d}</span>
      </span>`;
  }else{
    back.appendChild(createPie(card.n,card.d));
  }

  inner.appendChild(front);
  inner.appendChild(back);
  el.appendChild(inner);

  el.onclick=()=>clickCard(el);

  return el;
}

function clickCard(el){
  if(lock || el.classList.contains("flipped") || el.classList.contains("matched")) return;

  el.classList.add("flipped");

  if(!first){
    first=el;
  }else{
    second=el;
    lock=true;

    if(first.dataset.pair===second.dataset.pair && first.dataset.type!==second.dataset.type){

      first.classList.add("correct");
      second.classList.add("correct");

      setTimeout(()=>{
        first.classList.remove("correct");
        second.classList.remove("correct");

        first.classList.add("matched");
        second.classList.add("matched");

        reset();
      },2000);

    }else{

      first.classList.add("wrong");
      second.classList.add("wrong");

      setTimeout(()=>{
        first.classList.remove("wrong","flipped");
        second.classList.remove("wrong","flipped");

        reset();
      },2000);
    }
  }
}

function reset(){
  first=null;
  second=null;
  lock=false;
}

function start(){
  const board=document.getElementById("board");
  board.innerHTML="";

  let fracs=buildFractions();
  let cards=[];

  fracs.forEach(f=>{
    cards.push(createCard(f,"text"));
    cards.push(createCard(f,"pie"));
  });

  shuffle(cards).forEach(c=>board.appendChild(c));
}

start();

</script>

</body>
</html>
